services:
  postgres:
    image: postgres:16
    container_name: claimflow-postgres
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: claimflow_ai
    ports:
      - "5432:5432"
    volumes:
      - claimflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d claimflow_ai"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s


volumes:
  claimflow_pgdata: